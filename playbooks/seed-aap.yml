---
# playbooks/seed-aap.yml
# Seed AAP with the platform-ops project and job templates
#
# Credentials are retrieved from macOS Keychain (preferred) or environment variables.
#
# Setup keychain (one-time):
#   security add-generic-password -s "aap-credentials" -a "aap-hostname" -w "carmaap1.lan"
#   security add-generic-password -s "aap-credentials" -a "aap-username" -w "admin"
#   security add-generic-password -s "aap-credentials" -a "aap-password" -w "yourpassword"
#
# Usage:
#   ansible-playbook playbooks/seed-aap.yml
#
# Or with environment variables (fallback):
#   export AAP_HOST=carmaap1.lan
#   export AAP_USERNAME=admin
#   export AAP_PASSWORD=yourpassword
#   ansible-playbook playbooks/seed-aap.yml

- name: Seed AAP with Platform-Ops Project and Job Templates
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    # AAP Connection - keychain lookup with env fallback
    # Keychain: security find-generic-password -s "aap-credentials" -a "<account>" -w
    _keychain_host: "{{ lookup('pipe', 'security find-generic-password -s aap-credentials -a aap-hostname -w 2>/dev/null', errors='ignore') }}"
    _keychain_user: "{{ lookup('pipe', 'security find-generic-password -s aap-credentials -a aap-username -w 2>/dev/null', errors='ignore') }}"
    _keychain_pass: "{{ lookup('pipe', 'security find-generic-password -s aap-credentials -a aap-password -w 2>/dev/null', errors='ignore') }}"

    # Use keychain if available, else env, else fail
    aap_hostname: "https://{{ _keychain_host | default(lookup('env', 'AAP_HOST'), true) | mandatory }}"
    aap_username: "{{ _keychain_user | default(lookup('env', 'AAP_USERNAME'), true) | mandatory }}"
    aap_password: "{{ _keychain_pass | default(lookup('env', 'AAP_PASSWORD'), true) | mandatory }}"
    aap_validate_certs: false

    # Controller collection compatibility aliases
    controller_host: "{{ aap_hostname }}"
    controller_username: "{{ aap_username }}"
    controller_password: "{{ aap_password }}"
    controller_validate_certs: false

    # Organization
    controller_organizations:
      - name: "Default"

    # Project
    controller_projects:
      - name: "Platform Ops"
        organization: "Default"
        scm_type: git
        scm_url: "https://github.com/ffirg/platform-ops.git"
        scm_branch: "main"
        scm_update_on_launch: true
        update_project: true
        wait: false

    # Inventories
    controller_inventories:
      - name: "Platform Ops"
        organization: "Default"
        description: "Managed nodes for certificate testing"

      - name: "Platform Ops - AAP"
        organization: "Default"
        description: "AAP infrastructure hosts for certificate checking"

    # Hosts
    controller_hosts:
      - name: "aap-mgd-node-1.lan"
        inventory: "Platform Ops"

      - name: "carmaap1.lan"
        inventory: "Platform Ops - AAP"
        variables:
          aap_platform: containerized

    # Job Templates - prefix with repo name for clarity
    controller_templates:
      - name: "platform-ops | Check Server Certificates"
        organization: "Default"
        project: "Platform Ops"
        playbook: "playbooks/check-certs.yml"
        inventory: "Platform Ops"
        ask_variables_on_launch: true
        extra_vars:
          cert_checks: []

      - name: "platform-ops | Check AAP Certificates"
        organization: "Default"
        project: "Platform Ops"
        playbook: "playbooks/check-aap-certs.yml"
        inventory: "Platform Ops - AAP"
        ask_variables_on_launch: true

      - name: "platform-ops | Setup Test Certs"
        organization: "Default"
        project: "Platform Ops"
        playbook: "playbooks/setup-test-certs.yml"
        inventory: "Platform Ops"
        ask_variables_on_launch: true

      - name: "platform-ops | Test Certificate Expiry"
        organization: "Default"
        project: "Platform Ops"
        playbook: "playbooks/test-cert-expiry.yml"
        inventory: "Platform Ops"
        ask_variables_on_launch: true
        extra_vars:
          cert_scenario: expired

      - name: "platform-ops | Discover AAP Inventory"
        organization: "Default"
        project: "Platform Ops"
        playbook: "playbooks/discover-aap-inventory.yml"
        inventory: "Platform Ops - AAP"
        ask_variables_on_launch: true
        extra_vars:
          discovery_mode: report

  roles:
    - infra.aap_configuration.controller_organizations
    - infra.aap_configuration.controller_projects
    - infra.aap_configuration.controller_inventories
    - infra.aap_configuration.controller_hosts
    - infra.aap_configuration.controller_job_templates

  post_tasks:
    - name: Display results
      ansible.builtin.debug:
        msg: |
          Platform Ops seeding complete!

          Created:
            - Project: Platform Ops
            - Inventory: Platform Ops (managed nodes for certificate testing)
            - Inventory: Platform Ops - AAP (AAP infrastructure hosts)
            - Job Template: platform-ops | Check Server Certificates
            - Job Template: platform-ops | Check AAP Certificates
            - Job Template: platform-ops | Setup Test Certs
            - Job Template: platform-ops | Test Certificate Expiry
            - Job Template: platform-ops | Discover AAP Inventory

          Note: Job templates require machine credentials to be added
          manually via the AAP UI or API after seeding.

          Test certificate scenarios:
            ansible-playbook playbooks/test-cert-expiry.yml -e cert_scenario=ok
            ansible-playbook playbooks/test-cert-expiry.yml -e cert_scenario=warning
            ansible-playbook playbooks/test-cert-expiry.yml -e cert_scenario=critical
            ansible-playbook playbooks/test-cert-expiry.yml -e cert_scenario=expired
