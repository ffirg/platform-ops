---
# playbooks/seed-aap.yml
# Seed AAP with the platform-ops project and job templates
#
# Credentials are retrieved from macOS Keychain (preferred) or environment variables.
# Use EITHER token OR username/password authentication, not both.
#
# Setup keychain (one-time):
#   security add-generic-password -s "aap-credentials" -a "aap-hostname" -w "carmaap1.lan"
#   # Option 1: Token auth (preferred)
#   security add-generic-password -s "aap-credentials" -a "aap-token" -w "your-oauth-token"
#   # Option 2: Basic auth
#   security add-generic-password -s "aap-credentials" -a "aap-username" -w "admin"
#   security add-generic-password -s "aap-credentials" -a "aap-password" -w "yourpassword"
#
# Usage:
#   ansible-playbook playbooks/seed-aap.yml
#
# Or with environment variables (fallback):
#   export AAP_HOST=carmaap1.lan
#   export AAP_TOKEN=your-oauth-token  # OR
#   export AAP_USERNAME=admin
#   export AAP_PASSWORD=yourpassword
#   ansible-playbook playbooks/seed-aap.yml
- name: Seed AAP with Platform-Ops Project and Job Templates
  hosts: localhost
  vars:
    # AAP Connection - keychain lookup with env fallback
    # Keychain: security find-generic-password -s "aap-credentials" -a "<account>" -w
    _keychain_host: "{{ lookup('pipe', 'security find-generic-password -s aap-credentials -a aap-hostname -w 2>/dev/null', errors='ignore') }}"
    _keychain_token: "{{ lookup('pipe', 'security find-generic-password -s aap-credentials -a aap-token -w 2>/dev/null', errors='ignore') }}"
    _keychain_user: "{{ lookup('pipe', 'security find-generic-password -s aap-credentials -a aap-username -w 2>/dev/null', errors='ignore') }}"
    _keychain_pass: "{{ lookup('pipe', 'security find-generic-password -s aap-credentials -a aap-password -w 2>/dev/null', errors='ignore') }}"
    # Use keychain if available, else env, else fail
    # Token auth takes precedence over username/password
    aap_hostname: https://{{ _keychain_host | default(lookup('env', 'AAP_HOST'), true) | mandatory }}
    aap_token: "{{ _keychain_token | default(lookup('env', 'AAP_TOKEN'), true) }}"
    aap_username: "{{ _keychain_user | default(lookup('env', 'AAP_USERNAME'), true) }}"
    aap_password: "{{ _keychain_pass | default(lookup('env', 'AAP_PASSWORD'), true) }}"
    aap_validate_certs: false
    # Controller collection compatibility aliases
    # Use token if available, otherwise use username/password
    controller_host: "{{ aap_hostname }}"
    controller_oauthtoken: "{{ aap_token if aap_token | length > 0 else omit }}"
    controller_username: "{{ omit if aap_token | length > 0 else aap_username }}"
    controller_password: "{{ omit if aap_token | length > 0 else aap_password }}"
    controller_validate_certs: false
    # Organization
    controller_organizations:
      - name: Default
    # Project
    controller_projects:
      - name: Platform Ops
        organization: Default
        scm_type: git
        scm_url: https://github.com/ffirg/platform-ops.git
        scm_branch: main
        scm_update_on_launch: true
        update_project: true
        wait: false
    # Inventories
    controller_inventories:
      - name: Platform Ops
        organization: Default
        description: Managed nodes for certificate testing
      - name: AAP Infrastructure
        organization: Default
        description: Dynamically discovered AAP infrastructure nodes (created by check-aap-certs.yml)
    # Hosts (static hosts for non-AAP inventories)
    controller_hosts:
      - name: aap-mgd-node-1.lan
        inventory: Platform Ops
      - name: localhost
        inventory: AAP Infrastructure
        description: Local execution host for discovery play
        variables:
          ansible_connection: local
          ansible_python_interpreter: "{{ '{{' }} ansible_playbook_python {{ ' }}' }}"
    # Credentials - users must update these in AAP with valid values after seeding
    #
    # Required credentials:
    #   1. Platform Ops Machine - SSH access to managed nodes
    #   2. Platform Ops AAP - Gateway API access for node discovery (uses built-in type)
    controller_credentials:
      - name: Platform Ops Machine
        organization: Default
        credential_type: Machine
        description: SSH credential for Platform Ops managed nodes - UPDATE WITH VALID SSH KEY
        inputs:
          username: your_user
      - name: Platform Ops AAP
        organization: Default
        credential_type: Red Hat Ansible Automation Platform
        description: AAP Gateway API credentials for node discovery - UPDATE WITH VALID CREDENTIALS
        inputs:
          host: https://your_aap_hostname
          verify_ssl: false
    # Job Templates - prefix with repo name for clarity
    controller_templates:
      - name: platform-ops | Check Server Certificates
        organization: Default
        project: Platform Ops
        playbook: playbooks/check-certs.yml
        inventory: Platform Ops
        credentials:
          - Platform Ops Machine
        ask_variables_on_launch: true
      - name: platform-ops | Check AAP Certificates
        organization: Default
        project: Platform Ops
        playbook: playbooks/check-aap-certs.yml
        inventory: AAP Infrastructure
        credentials:
          - Platform Ops Machine
          - Platform Ops AAP
        ask_variables_on_launch: true
      - name: platform-ops | Setup Test Certs
        organization: Default
        project: Platform Ops
        playbook: playbooks/setup-test-certs.yml
        inventory: Platform Ops
        credentials:
          - Platform Ops Machine
        ask_variables_on_launch: true
      - name: platform-ops | Test Certificate Expiry
        organization: Default
        project: Platform Ops
        playbook: playbooks/test-cert-expiry.yml
        inventory: Platform Ops
        credentials:
          - Platform Ops Machine
        ask_variables_on_launch: true
        extra_vars:
          cert_scenario: expired
      - name: platform-ops | Blue-Green Demo
        organization: Default
        project: Platform Ops
        playbook: playbooks/blue_green_demo.yml
        inventory: AAP Infrastructure
        credentials:
          - Platform Ops Machine
        ask_variables_on_launch: true
        ask_limit_on_launch: true
        extra_vars:
          bg_operation: status
      - name: platform-ops | Website Remediation
        organization: Default
        project: Platform Ops
        playbook: playbooks/website_remediation.yml
        inventory: AAP Infrastructure
        credentials:
          - Platform Ops Machine
        ask_variables_on_launch: true
        ask_limit_on_launch: true
        extra_vars:
          remediation_operation: analyze
  connection: local
  gather_facts: false
  roles:
    - infra.aap_configuration.controller_organizations
    - infra.aap_configuration.controller_projects
    - infra.aap_configuration.controller_inventories
    - infra.aap_configuration.controller_hosts
    - infra.aap_configuration.controller_credential_types
    - infra.aap_configuration.controller_credentials
    - infra.aap_configuration.controller_job_templates
  post_tasks:
    - name: Display results
      ansible.builtin.debug:
        msg: |
          Platform Ops seeding complete!
          Created:
            - Project: Platform Ops
            - Inventory: Platform Ops (managed nodes for certificate testing)
            - Inventory: AAP Infrastructure (dynamically populated by check-aap-certs.yml)
            - Credential: Platform Ops Machine (SSH credential)
            - Credential: Platform Ops AAP (Red Hat Ansible Automation Platform type)
            - Job Templates: Check Certificates, Blue-Green Demo, Website Remediation
          IMPORTANT: First-time setup required!
            1. Edit "Platform Ops Machine" credential - add SSH username and private key
            2. Edit "Platform Ops AAP" credential - add AAP hostname, username, password
          Job Templates:
            - platform-ops | Check Server Certificates
            - platform-ops | Check AAP Certificates
            - platform-ops | Setup Test Certs
            - platform-ops | Test Certificate Expiry
            - platform-ops | Blue-Green Demo
            - platform-ops | Website Remediation
          Test certificate scenarios:
            ansible-playbook playbooks/test-cert-expiry.yml -e cert_scenario=ok
            ansible-playbook playbooks/test-cert-expiry.yml -e cert_scenario=warning
            ansible-playbook playbooks/test-cert-expiry.yml -e cert_scenario=critical
            ansible-playbook playbooks/test-cert-expiry.yml -e cert_scenario=expired
