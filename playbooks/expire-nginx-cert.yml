---
# playbooks/expire-nginx-cert.yml
# Generate an expired certificate for testing

- name: Create expired nginx certificate
  hosts: all
  become: true

  tasks:
    - name: Install faketime if available
      ansible.builtin.dnf:
        name: libfaketime
        state: present
      ignore_errors: true

    - name: Generate expired certificate
      ansible.builtin.shell:
        cmd: |
          cd /etc/nginx/ssl
          # Calculate dates: started 10 days ago, ended 5 days ago
          START_DATE=$(date -d '-10 days' '+%Y%m%d%H%M%SZ' 2>/dev/null || date -v-10d '+%Y%m%d%H%M%SZ')
          END_DATE=$(date -d '-5 days' '+%Y%m%d%H%M%SZ' 2>/dev/null || date -v-5d '+%Y%m%d%H%M%SZ')

          # Generate key
          openssl genrsa -out server.key 2048

          # Generate CSR
          openssl req -new -key server.key -out server.csr \
            -subj "/CN={{ ansible_fqdn }}/O=Test-Expired/C=GB"

          # Self-sign with explicit dates (requires openssl 1.1.1+)
          openssl x509 -req -in server.csr \
            -signkey server.key \
            -out server.crt \
            -days 1 \
            -set_serial $(date +%s) \
            -not_before "$START_DATE" \
            -not_after "$END_DATE" 2>/dev/null || \
          # Fallback for older openssl - create cert expiring in 1 second
          openssl req -x509 -nodes -days 1 \
            -newkey rsa:2048 \
            -keyout server.key \
            -out server.crt \
            -subj "/CN={{ ansible_fqdn }}/O=Test-Expired/C=GB" && sleep 2

          rm -f server.csr
      register: cert_result

    - name: Verify certificate is expired
      ansible.builtin.shell:
        cmd: |
          openssl x509 -in /etc/nginx/ssl/server.crt -noout -dates
          openssl x509 -in /etc/nginx/ssl/server.crt -checkend 0 && echo "VALID" || echo "EXPIRED"
      register: verify_result

    - name: Show certificate status
      ansible.builtin.debug:
        msg: "{{ verify_result.stdout_lines }}"

    - name: Reload nginx to use new cert
      ansible.builtin.systemd:
        name: nginx
        state: reloaded
