---
# playbooks/expire-nginx-cert.yml
# Generate an expired certificate for testing using mini-CA approach

- name: Create expired nginx certificate
  hosts: all
  become: true

  tasks:
    - name: Create CA directory
      ansible.builtin.file:
        path: /etc/nginx/ssl/ca
        state: directory
        mode: '0700'

    - name: Create OpenSSL CA config
      ansible.builtin.copy:
        dest: /etc/nginx/ssl/ca/openssl.cnf
        mode: '0600'
        content: |
          [ ca ]
          default_ca = CA_default

          [ CA_default ]
          dir = /etc/nginx/ssl/ca
          database = $dir/index.txt
          serial = $dir/serial
          new_certs_dir = $dir
          certificate = $dir/ca.crt
          private_key = $dir/ca.key
          default_md = sha256
          policy = policy_any
          copy_extensions = copy

          [ policy_any ]
          countryName = optional
          stateOrProvinceName = optional
          organizationName = optional
          organizationalUnitName = optional
          commonName = supplied
          emailAddress = optional

          [ req ]
          distinguished_name = req_dn
          x509_extensions = v3_ca
          prompt = no

          [ req_dn ]
          CN = Test CA

          [ v3_ca ]
          basicConstraints = critical, CA:TRUE
          keyUsage = critical, keyCertSign, cRLSign

          [ server_cert ]
          basicConstraints = CA:FALSE
          keyUsage = critical, digitalSignature, keyEncipherment
          extendedKeyUsage = serverAuth

    - name: Initialize CA database
      ansible.builtin.shell:
        cmd: |
          cd /etc/nginx/ssl/ca
          touch index.txt
          echo '01' > serial
      args:
        creates: /etc/nginx/ssl/ca/index.txt

    - name: Generate CA key and certificate
      ansible.builtin.shell:
        cmd: |
          cd /etc/nginx/ssl/ca
          openssl genrsa -out ca.key 2048
          openssl req -new -x509 -days 365 -key ca.key -out ca.crt -config openssl.cnf
      args:
        creates: /etc/nginx/ssl/ca/ca.crt

    - name: Generate server key and CSR
      ansible.builtin.shell:
        cmd: |
          cd /etc/nginx/ssl
          openssl genrsa -out server.key 2048
          openssl req -new -key server.key -out server.csr \
            -subj "/CN={{ ansible_fqdn }}/O=Test-Expired/C=GB"
      register: csr_result

    - name: Calculate expired dates
      ansible.builtin.set_fact:
        start_date: "{{ '%Y%m%d%H%M%SZ' | strftime((ansible_date_time.epoch | int) - 864000) }}"
        end_date: "{{ '%Y%m%d%H%M%SZ' | strftime((ansible_date_time.epoch | int) - 432000) }}"

    - name: Sign certificate with expired dates
      ansible.builtin.shell:
        cmd: |
          cd /etc/nginx/ssl
          openssl ca -batch -config ca/openssl.cnf \
            -extensions server_cert \
            -startdate {{ start_date }} \
            -enddate {{ end_date }} \
            -in server.csr \
            -out server.crt \
            -notext
          rm -f server.csr
      register: sign_result

    - name: Verify certificate is expired
      ansible.builtin.shell:
        cmd: |
          openssl x509 -in /etc/nginx/ssl/server.crt -noout -dates
          openssl x509 -in /etc/nginx/ssl/server.crt -checkend 0 && echo "VALID" || echo "EXPIRED"
      register: verify_result

    - name: Show certificate status
      ansible.builtin.debug:
        msg: "{{ verify_result.stdout_lines }}"

    - name: Reload nginx to use new cert
      ansible.builtin.systemd:
        name: nginx
        state: reloaded
