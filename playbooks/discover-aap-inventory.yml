---
# playbooks/discover-aap-inventory.yml
# Discover AAP infrastructure from Gateway API and generate static inventory
#
# This playbook queries the AAP Gateway API to discover all service nodes
# and generates inventory/aap.yml with proper grouping.
#
# Local usage (macOS with keychain):
#   ansible-playbook playbooks/discover-aap-inventory.yml
#
# AAP job template usage:
#   - Provide aap_hostname, aap_username, aap_password as extra vars
#   - Or use AAP credential injection via environment variables
#   - Set write_inventory_file: false (execution environment is ephemeral)
#
# Output:
#   - Console: Discovered infrastructure summary
#   - JSON: AAP_INVENTORY_JSON= line for parsing
#   - File: inventory/aap.yml (when write_inventory_file: true)

- name: Discover AAP Infrastructure from Gateway API
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    # AAP Connection - try keychain first (macOS), then env vars, then extra vars
    # Keychain lookup fails silently on non-macOS systems
    _keychain_host: "{{ lookup('pipe', 'security find-generic-password -s aap-credentials -a aap-hostname -w 2>/dev/null || true', errors='ignore') }}"
    _keychain_user: "{{ lookup('pipe', 'security find-generic-password -s aap-credentials -a aap-username -w 2>/dev/null || true', errors='ignore') }}"
    _keychain_pass: "{{ lookup('pipe', 'security find-generic-password -s aap-credentials -a aap-password -w 2>/dev/null || true', errors='ignore') }}"

    # Priority: extra vars (gateway_*) > keychain > environment
    # When running in AAP, pass gateway_host, gateway_user, gateway_pass as extra vars
    aap_hostname: "{{ gateway_host | default(_keychain_host, true) | default(lookup('env', 'AAP_HOST'), true) | mandatory }}"
    aap_username: "{{ gateway_user | default(_keychain_user, true) | default(lookup('env', 'AAP_USERNAME'), true) | mandatory }}"
    aap_password: "{{ gateway_pass | default(_keychain_pass, true) | default(lookup('env', 'AAP_PASSWORD'), true) | mandatory }}"
    aap_validate_certs: false

    # Output options
    write_inventory_file: true
    inventory_output: "{{ playbook_dir }}/../inventory/aap.yml"

  tasks:
    - name: Query Gateway API for service types
      ansible.builtin.uri:
        url: "https://{{ aap_hostname }}/api/gateway/v1/service_types/"
        method: GET
        user: "{{ aap_username }}"
        password: "{{ aap_password }}"
        force_basic_auth: true
        validate_certs: "{{ aap_validate_certs }}"
        return_content: true
      register: _service_types

    - name: Query Gateway API for service nodes
      ansible.builtin.uri:
        url: "https://{{ aap_hostname }}/api/gateway/v1/service_nodes/"
        method: GET
        user: "{{ aap_username }}"
        password: "{{ aap_password }}"
        force_basic_auth: true
        validate_certs: "{{ aap_validate_certs }}"
        return_content: true
      register: _service_nodes

    - name: Build service type mapping
      ansible.builtin.set_fact:
        service_type_map: "{{ dict(_service_types.json.results | map(attribute='id') | zip(_service_types.json.results | map(attribute='name'))) }}"

    - name: Process discovered nodes
      ansible.builtin.set_fact:
        discovered_nodes: >-
          {{
            _service_nodes.json.results | map(attribute='address') | unique | list
          }}
        nodes_by_service: >-
          {{
            _service_nodes.json.results
            | groupby(attribute='summary_fields.service_cluster.service_type')
            | map('last')
            | map('map', attribute='address')
            | map('unique')
            | map('list')
            | list
          }}
        service_ids: >-
          {{
            _service_nodes.json.results
            | groupby(attribute='summary_fields.service_cluster.service_type')
            | map('first')
            | list
          }}

    - name: Initialize host services
      ansible.builtin.set_fact:
        host_services: {}

    - name: Build host services mapping
      ansible.builtin.set_fact:
        host_services: >-
          {{ host_services | combine({
               item: _service_nodes.json.results
                     | selectattr('address', 'eq', item)
                     | map(attribute='summary_fields.service_cluster.service_type')
                     | map('extract', service_type_map)
                     | list
             }) }}
      loop: "{{ discovered_nodes }}"

    - name: Display discovered infrastructure
      ansible.builtin.debug:
        msg: |
          Discovered AAP Infrastructure:
          ═══════════════════════════════════════════════════════════════
          Gateway: {{ aap_hostname }}
          Service Types: {{ service_type_map.values() | list | join(', ') }}

          Hosts:
          {% for node in _service_nodes.json.results %}
            - {{ node.address }} ({{ service_type_map[node.summary_fields.service_cluster.service_type] }})
          {% endfor %}
          ═══════════════════════════════════════════════════════════════

    - name: Initialize inventory hostvars
      ansible.builtin.set_fact:
        inventory_hostvars: {}

    - name: Build hostvars for inventory
      ansible.builtin.set_fact:
        inventory_hostvars: >-
          {{ inventory_hostvars | combine({
               item: {
                 'aap_services': host_services[item],
                 'aap_platform': 'containerized'
               }
             }) }}
      loop: "{{ discovered_nodes }}"

    - name: Build inventory JSON for output
      ansible.builtin.set_fact:
        inventory_json:
          _meta:
            hostvars: "{{ inventory_hostvars }}"
          all:
            children: "{{ ['aap_all'] }}"
          aap_all:
            hosts: "{{ discovered_nodes }}"
            vars:
              cert_warning_days: 30
              cert_critical_days: 14
            children: "{{ service_ids | map('extract', service_type_map) | map('regex_replace', '^', 'aap_') | list }}"

    - name: Output inventory JSON for AAP job capture
      ansible.builtin.debug:
        msg: "AAP_INVENTORY_JSON={{ inventory_json | to_json }}"

    - name: Generate static inventory file
      ansible.builtin.template:
        src: aap_inventory.yml.j2
        dest: "{{ inventory_output }}"
        mode: "0644"
      when: write_inventory_file | bool

    - name: Display completion message
      ansible.builtin.debug:
        msg: |
          {% if write_inventory_file | bool %}
          Inventory generated: {{ inventory_output }}

          Usage:
            ansible-playbook playbooks/check-aap-certs.yml -i inventory/aap.yml

          Or use the dynamic inventory:
            ansible-playbook playbooks/check-aap-certs.yml -i plugins/inventory/aap_gateway.py
          {% else %}
          Discovery complete. JSON output above can be parsed with:
            grep 'AAP_INVENTORY_JSON=' | cut -d= -f2- | jq .
          {% endif %}
