---
# playbooks/discover-aap-inventory.yml
# Discover AAP infrastructure from Gateway API and optionally persist
#
# Discovery modes (set via discovery_mode variable):
#   report      - Display discovered infrastructure only (default)
#   write_file  - Write inventory/aap.yml locally
#   update_aap  - Create/update hosts in AAP inventory via Controller API
#   commit_repo - Write file, commit and push to git repo
#
# Local usage (macOS with keychain):
#   ansible-playbook playbooks/discover-aap-inventory.yml
#   ansible-playbook playbooks/discover-aap-inventory.yml -e discovery_mode=write_file
#   ansible-playbook playbooks/discover-aap-inventory.yml -e discovery_mode=commit_repo
#
# AAP job template usage:
#   - Pass aap_hostname, aap_username, aap_password as extra vars
#   - Set discovery_mode as needed (report, update_aap)
#
# Output:
#   - Console: Discovered infrastructure summary
#   - JSON: AAP_INVENTORY_JSON= line for parsing
#   - File/Repo/AAP: Depends on discovery_mode

- name: Discover AAP Infrastructure from Gateway API
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    # AAP Gateway Connection - keychain with env fallback
    _keychain_host: "{{ lookup('pipe', 'security find-generic-password -s aap-credentials -a aap-hostname -w 2>/dev/null || true', errors='ignore') }}"
    _keychain_user: "{{ lookup('pipe', 'security find-generic-password -s aap-credentials -a aap-username -w 2>/dev/null || true', errors='ignore') }}"
    _keychain_pass: "{{ lookup('pipe', 'security find-generic-password -s aap-credentials -a aap-password -w 2>/dev/null || true', errors='ignore') }}"

    aap_hostname: "{{ _keychain_host | default(lookup('env', 'AAP_HOST'), true) | mandatory }}"
    aap_username: "{{ _keychain_user | default(lookup('env', 'AAP_USERNAME'), true) | mandatory }}"
    aap_password: "{{ _keychain_pass | default(lookup('env', 'AAP_PASSWORD'), true) | mandatory }}"
    aap_validate_certs: false

    # Discovery mode: report, write_file, update_aap, commit_repo
    discovery_mode: report

    # Output paths (for write_file and commit_repo modes)
    inventory_output: "{{ playbook_dir }}/../inventory/aap.yml"
    repo_root: "{{ playbook_dir }}/.."

    # AAP inventory settings (for update_aap mode)
    aap_inventory_name: "Platform Ops - AAP"
    aap_organization: "Default"

    # Git settings (for commit_repo mode)
    git_remote: origin
    git_branch: main
    git_user_name: "AAP Discovery"
    git_user_email: "aap-discovery@localhost"

  roles:
    - role: discover_aap_nodes

  tasks:
    # =========================================================================
    # JSON OUTPUT - For parsing by external tools
    # =========================================================================
    - name: Initialize inventory hostvars
      ansible.builtin.set_fact:
        _inventory_hostvars: {}

    - name: Build inventory hostvars
      ansible.builtin.set_fact:
        _inventory_hostvars: >-
          {{ _inventory_hostvars | combine({
               item: {'aap_services': discovered_host_services[item], 'aap_platform': 'containerized'}
             }) }}
      loop: "{{ discovered_aap_nodes }}"

    - name: Build inventory JSON for output
      ansible.builtin.set_fact:
        inventory_json:
          _meta:
            hostvars: "{{ _inventory_hostvars }}"
          all:
            children: ["aap_all"]
          aap_all:
            hosts: "{{ discovered_aap_nodes }}"
            vars:
              cert_warning_days: 30
              cert_critical_days: 14

    - name: Output inventory JSON for parsing
      ansible.builtin.debug:
        msg: "AAP_INVENTORY_JSON={{ inventory_json | to_json }}"

    # =========================================================================
    # MODE: write_file - Write inventory to local file
    # =========================================================================
    - name: Generate static inventory file
      ansible.builtin.template:
        src: aap_inventory_v2.yml.j2
        dest: "{{ inventory_output }}"
        mode: "0644"
      when: discovery_mode in ['write_file', 'commit_repo']

    # =========================================================================
    # MODE: commit_repo - Commit and push to git
    # =========================================================================
    - name: Configure git user
      ansible.builtin.command:
        cmd: "git config user.name '{{ git_user_name }}'"
        chdir: "{{ repo_root }}"
      when: discovery_mode == 'commit_repo'
      changed_when: false

    - name: Configure git email
      ansible.builtin.command:
        cmd: "git config user.email '{{ git_user_email }}'"
        chdir: "{{ repo_root }}"
      when: discovery_mode == 'commit_repo'
      changed_when: false

    - name: Check for inventory changes
      ansible.builtin.command:
        cmd: git diff --exit-code inventory/aap.yml
        chdir: "{{ repo_root }}"
      register: _git_diff
      failed_when: false
      changed_when: false
      when: discovery_mode == 'commit_repo'

    - name: Stage inventory file
      ansible.builtin.command:
        cmd: git add inventory/aap.yml
        chdir: "{{ repo_root }}"
      when:
        - discovery_mode == 'commit_repo'
        - _git_diff.rc != 0

    - name: Commit inventory changes
      ansible.builtin.command:
        cmd: >-
          git commit -m "chore: update AAP inventory from Gateway API discovery

          Discovered hosts: {{ discovered_aap_nodes | join(', ') }}
          Services: {{ discovered_aap_services | join(', ') }}

          Generated by: discover-aap-inventory.yml"
        chdir: "{{ repo_root }}"
      when:
        - discovery_mode == 'commit_repo'
        - _git_diff.rc != 0

    - name: Push changes to remote
      ansible.builtin.command:
        cmd: "git push {{ git_remote }} {{ git_branch }}"
        chdir: "{{ repo_root }}"
      when:
        - discovery_mode == 'commit_repo'
        - _git_diff.rc != 0
      register: _git_push

    # =========================================================================
    # MODE: update_aap - Update AAP inventory via Controller API
    # =========================================================================
    - name: Get AAP inventory ID
      ansible.builtin.uri:
        url: "https://{{ aap_hostname }}/api/controller/v2/inventories/?name={{ aap_inventory_name | urlencode }}"
        method: GET
        user: "{{ aap_username }}"
        password: "{{ aap_password }}"
        force_basic_auth: true
        validate_certs: "{{ aap_validate_certs }}"
      register: _aap_inventory
      when: discovery_mode == 'update_aap'

    - name: Create AAP inventory if not exists
      ansible.builtin.uri:
        url: "https://{{ aap_hostname }}/api/controller/v2/inventories/"
        method: POST
        user: "{{ aap_username }}"
        password: "{{ aap_password }}"
        force_basic_auth: true
        validate_certs: "{{ aap_validate_certs }}"
        body_format: json
        body:
          name: "{{ aap_inventory_name }}"
          organization: 1
          description: "AAP infrastructure hosts - auto-discovered from Gateway API"
        status_code: [200, 201]
      register: _created_inventory
      when:
        - discovery_mode == 'update_aap'
        - _aap_inventory.json.count == 0

    - name: Set inventory ID
      ansible.builtin.set_fact:
        _inventory_id: "{{ _created_inventory.json.id if _aap_inventory.json.count == 0 else _aap_inventory.json.results[0].id }}"
      when: discovery_mode == 'update_aap'

    - name: Create or update hosts in AAP inventory
      ansible.builtin.uri:
        url: "https://{{ aap_hostname }}/api/controller/v2/hosts/"
        method: POST
        user: "{{ aap_username }}"
        password: "{{ aap_password }}"
        force_basic_auth: true
        validate_certs: "{{ aap_validate_certs }}"
        body_format: json
        body:
          name: "{{ item }}"
          inventory: "{{ _inventory_id }}"
          variables: "{{ {'aap_services': discovered_host_services[item], 'aap_platform': 'containerized'} | to_yaml }}"
        status_code: [200, 201, 400]
      loop: "{{ discovered_aap_nodes }}"
      when: discovery_mode == 'update_aap'
      register: _host_results

    - name: Get existing hosts for update
      ansible.builtin.uri:
        url: "https://{{ aap_hostname }}/api/controller/v2/hosts/?name={{ item }}&inventory={{ _inventory_id }}"
        method: GET
        user: "{{ aap_username }}"
        password: "{{ aap_password }}"
        force_basic_auth: true
        validate_certs: "{{ aap_validate_certs }}"
      loop: "{{ discovered_aap_nodes }}"
      register: _existing_hosts
      when: discovery_mode == 'update_aap'

    - name: Patch host variables
      ansible.builtin.uri:
        url: "https://{{ aap_hostname }}/api/controller/v2/hosts/{{ item.json.results[0].id }}/"
        method: PATCH
        user: "{{ aap_username }}"
        password: "{{ aap_password }}"
        force_basic_auth: true
        validate_certs: "{{ aap_validate_certs }}"
        body_format: json
        body:
          variables: "{{ {'aap_services': discovered_host_services[item.item], 'aap_platform': 'containerized'} | to_yaml }}"
      loop: "{{ _existing_hosts.results }}"
      when:
        - discovery_mode == 'update_aap'
        - item.json.count > 0
      loop_control:
        label: "{{ item.item }}"

    # =========================================================================
    # COMPLETION
    # =========================================================================
    - name: Display completion message
      ansible.builtin.debug:
        msg: |
          {% if discovery_mode == 'write_file' %}
          Inventory written to: {{ inventory_output }}

          Usage:
            ansible-playbook playbooks/check-aap-certs.yml -i inventory/aap.yml
          {% elif discovery_mode == 'commit_repo' %}
          {% if _git_diff.rc | default(0) != 0 %}
          Inventory committed and pushed to {{ git_remote }}/{{ git_branch }}

          Sync the project in AAP to use the updated inventory.
          {% else %}
          No changes to inventory - already up to date
          {% endif %}
          {% elif discovery_mode == 'update_aap' %}
          AAP inventory "{{ aap_inventory_name }}" updated with {{ discovered_aap_nodes | length }} host(s)

          The inventory is now available in AAP for job templates.
          {% else %}
          Discovery complete (report mode)

          JSON output can be parsed with:
            grep 'AAP_INVENTORY_JSON=' | cut -d= -f2- | jq .
          {% endif %}
