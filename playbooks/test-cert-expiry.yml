---
# playbooks/test-cert-expiry.yml
# Generate certificates with different expiry conditions for testing
#
# Usage:
#   -e cert_scenario=expired   # Already expired (default)
#   -e cert_scenario=critical  # Expires within 14 days
#   -e cert_scenario=warning   # Expires within 30 days
#   -e cert_scenario=ok        # Expires in 90 days

- name: Create test certificate with specified expiry condition
  hosts: all
  become: true

  vars:
    cert_scenario: expired  # expired, critical, warning, ok
    # Days from now for each scenario
    scenario_days:
      expired: -5      # 5 days ago
      critical: 10     # 10 days (within 14-day critical threshold)
      warning: 20      # 20 days (within 30-day warning threshold)
      ok: 90           # 90 days (healthy)

  tasks:
    - name: Validate scenario
      ansible.builtin.assert:
        that:
          - cert_scenario in ['expired', 'critical', 'warning', 'ok']
        fail_msg: "cert_scenario must be one of: expired, critical, warning, ok"

    - name: Display scenario
      ansible.builtin.debug:
        msg: >-
          Creating certificate with scenario: {{ cert_scenario }}
          ({{ scenario_days[cert_scenario] }} days)

    - name: Create CA directory
      ansible.builtin.file:
        path: /etc/nginx/ssl/ca
        state: directory
        mode: '0700'

    - name: Generate CA private key
      community.crypto.openssl_privatekey:
        path: /etc/nginx/ssl/ca/ca.key
        size: 2048
        mode: '0600'

    - name: Generate CA certificate
      community.crypto.x509_certificate:
        path: /etc/nginx/ssl/ca/ca.crt
        privatekey_path: /etc/nginx/ssl/ca/ca.key
        provider: selfsigned
        selfsigned_not_after: "+365d"
        subject:
          commonName: "Test CA"
        basic_constraints:
          - "CA:TRUE"
        basic_constraints_critical: true
        key_usage:
          - keyCertSign
          - cRLSign
        key_usage_critical: true
        mode: '0644'

    - name: Generate server private key
      community.crypto.openssl_privatekey:
        path: /etc/nginx/ssl/server.key
        size: 2048
        mode: '0600'
        force: true

    - name: Generate server CSR
      community.crypto.openssl_csr:
        path: /etc/nginx/ssl/server.csr
        privatekey_path: /etc/nginx/ssl/server.key
        subject:
          commonName: "{{ ansible_fqdn }}"
          organizationName: "Test-{{ cert_scenario | capitalize }}"
          countryName: "GB"
        key_usage:
          - digitalSignature
          - keyEncipherment
        key_usage_critical: true
        extended_key_usage:
          - serverAuth
        mode: '0644'

    - name: Calculate certificate validity period
      ansible.builtin.set_fact:
        _days: "{{ scenario_days[cert_scenario] | int }}"
        _not_before: "-1d"
        _not_after: "{{ '%+dd' | format(scenario_days[cert_scenario] | int) }}"

    - name: Sign server certificate with CA
      community.crypto.x509_certificate:
        path: /etc/nginx/ssl/server.crt
        csr_path: /etc/nginx/ssl/server.csr
        provider: ownca
        ownca_path: /etc/nginx/ssl/ca/ca.crt
        ownca_privatekey_path: /etc/nginx/ssl/ca/ca.key
        ownca_not_before: "{{ _not_before }}"
        ownca_not_after: "{{ _not_after }}"
        mode: '0644'
        force: true

    - name: Clean up CSR
      ansible.builtin.file:
        path: /etc/nginx/ssl/server.csr
        state: absent

    - name: Verify certificate
      community.crypto.x509_certificate_info:
        path: /etc/nginx/ssl/server.crt
      register: _cert_info

    - name: Calculate days remaining
      ansible.builtin.set_fact:
        _days_remaining: >-
          {{ ((_cert_info.not_after | to_datetime('%Y%m%d%H%M%SZ')).date()
              - (now(utc=true).date())).days }}

    - name: Show certificate status
      ansible.builtin.debug:
        msg:
          - "Subject: {{ _cert_info.subject.commonName }}"
          - "Not Before: {{ _cert_info.not_before }}"
          - "Not After: {{ _cert_info.not_after }}"
          - "Days Remaining: {{ _days_remaining }}"
          - "Status: {{ 'EXPIRED' if _cert_info.expired else 'VALID' }}"

    - name: Reload nginx
      ansible.builtin.systemd:
        name: nginx
        state: reloaded
