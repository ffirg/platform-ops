---
# playbooks/test-cert-expiry.yml
# Generate certificates with different expiry conditions for testing
#
# Usage:
#   -e cert_scenario=expired   # Already expired (default)
#   -e cert_scenario=critical  # Expires within 14 days
#   -e cert_scenario=warning   # Expires within 30 days
#   -e cert_scenario=ok        # Expires in 90 days

- name: Create test certificate with specified expiry condition
  hosts: all
  become: true

  vars:
    cert_scenario: expired  # expired, critical, warning, ok
    # Days from now for each scenario
    scenario_days:
      expired: -5      # 5 days ago
      critical: 10     # 10 days (within 14-day critical threshold)
      warning: 20      # 20 days (within 30-day warning threshold)
      ok: 90           # 90 days (healthy)

  tasks:
    - name: Validate scenario
      ansible.builtin.assert:
        that:
          - cert_scenario in ['expired', 'critical', 'warning', 'ok']
        fail_msg: "cert_scenario must be one of: expired, critical, warning, ok"

    - name: Display scenario
      ansible.builtin.debug:
        msg: "Creating certificate with scenario: {{ cert_scenario }} ({{ scenario_days[cert_scenario] }} days)"

    - name: Create CA directory
      ansible.builtin.file:
        path: /etc/nginx/ssl/ca
        state: directory
        mode: '0700'

    - name: Create OpenSSL CA config
      ansible.builtin.copy:
        dest: /etc/nginx/ssl/ca/openssl.cnf
        mode: '0600'
        content: |
          [ ca ]
          default_ca = CA_default

          [ CA_default ]
          dir = /etc/nginx/ssl/ca
          database = $dir/index.txt
          serial = $dir/serial
          new_certs_dir = $dir
          certificate = $dir/ca.crt
          private_key = $dir/ca.key
          default_md = sha256
          policy = policy_any
          copy_extensions = copy

          [ policy_any ]
          countryName = optional
          stateOrProvinceName = optional
          organizationName = optional
          organizationalUnitName = optional
          commonName = supplied
          emailAddress = optional

          [ req ]
          distinguished_name = req_dn
          x509_extensions = v3_ca
          prompt = no

          [ req_dn ]
          CN = Test CA

          [ v3_ca ]
          basicConstraints = critical, CA:TRUE
          keyUsage = critical, keyCertSign, cRLSign

          [ server_cert ]
          basicConstraints = CA:FALSE
          keyUsage = critical, digitalSignature, keyEncipherment
          extendedKeyUsage = serverAuth

    - name: Reset CA database
      ansible.builtin.shell:
        cmd: |
          set -o pipefail
          cd /etc/nginx/ssl/ca
          rm -f index.txt index.txt.old index.txt.attr
          touch index.txt
          echo "$(date +%s)" > serial
      changed_when: true

    - name: Generate CA key and certificate
      ansible.builtin.shell:
        cmd: |
          cd /etc/nginx/ssl/ca
          openssl genrsa -out ca.key 2048
          openssl req -new -x509 -days 365 -key ca.key -out ca.crt -config openssl.cnf
      args:
        creates: /etc/nginx/ssl/ca/ca.crt

    - name: Generate server key and CSR
      ansible.builtin.shell:
        cmd: |
          set -o pipefail
          cd /etc/nginx/ssl
          openssl genrsa -out server.key 2048
          openssl req -new -key server.key -out server.csr \
            -subj "/CN={{ ansible_fqdn }}/O=Test-{{ cert_scenario | capitalize }}/C=GB"
      changed_when: true

    - name: Calculate certificate dates
      ansible.builtin.set_fact:
        _days: "{{ scenario_days[cert_scenario] | int }}"

    - name: Set start and end dates
      ansible.builtin.set_fact:
        start_date: "{{ '%Y%m%d%H%M%SZ' | strftime((ansible_date_time.epoch | int) - 86400) }}"
        end_date: "{{ '%Y%m%d%H%M%SZ' | strftime((ansible_date_time.epoch | int) + (_days | int * 86400)) }}"

    - name: Sign certificate
      ansible.builtin.shell:
        cmd: |
          set -o pipefail
          cd /etc/nginx/ssl
          openssl ca -batch -config ca/openssl.cnf \
            -extensions server_cert \
            -startdate {{ start_date }} \
            -enddate {{ end_date }} \
            -in server.csr \
            -out server.crt \
            -notext
          rm -f server.csr
      changed_when: true

    - name: Verify certificate
      ansible.builtin.shell:
        cmd: |
          set -o pipefail
          openssl x509 -in /etc/nginx/ssl/server.crt -noout -dates
          openssl x509 -in /etc/nginx/ssl/server.crt -checkend 0 && echo "STATUS: VALID" || echo "STATUS: EXPIRED"
      register: verify_result
      changed_when: false

    - name: Show certificate status
      ansible.builtin.debug:
        msg: "{{ verify_result.stdout_lines }}"

    - name: Reload nginx
      ansible.builtin.systemd:
        name: nginx
        state: reloaded
