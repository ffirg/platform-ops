---
# playbooks/check-certs.yml
# Generic certificate checking playbook with orchestrator-ready output
#
# Usage:
#   # Auto-discover certificates on all hosts
#   ansible-playbook playbooks/check-certs.yml -i inventory.yml
#
#   # Check specific certificate files
#   ansible-playbook playbooks/check-certs.yml -i inventory.yml \
#     -e '{"cert_checks": [{"name": "Nginx", "type": "file", "path": "/etc/nginx/ssl/server.crt"}]}'
#
#   # Check remote TLS endpoints
#   ansible-playbook playbooks/check-certs.yml -i localhost, \
#     -e '{"cert_checks": [{"name": "GitHub", "type": "remote", "host": "github.com", "port": 443}]}'
#
#   # Generate markdown report
#   ansible-playbook playbooks/check-certs.yml -i inventory.yml \
#     -e "cert_report_file=/tmp/cert-report.md"
#
# Output (cert_output_json=true):
#   JSON report includes orchestrator-ready data:
#     - flags.all_ok          Boolean - all certs healthy
#     - flags.has_expiring    Boolean - warning/critical certs exist
#     - flags.has_expired     Boolean - expired certs exist
#     - flags.has_problems    Boolean - missing/error certs exist
#     - flags.needs_action    Boolean - any action required
#     - lists.valid[]         Pre-filtered healthy certs
#     - lists.expiring[]      Pre-filtered warning/critical certs
#     - lists.expired[]       Pre-filtered expired certs
#     - lists.problems[]      Pre-filtered missing/error certs
- name: Check Server Certificates
  hosts: all
  vars:
    # Override these as needed
    cert_warning_days: 30
    cert_critical_days: 14
    cert_show_paths: false
    cert_show_chain: true
    cert_output_json: true
    cert_report_file: ""
    # Explicit checks (empty = auto-discover)
    cert_checks: []
  gather_facts: true
  roles:
    - role: check_server_certs
