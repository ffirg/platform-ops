---
# roles/check_cert_file/tasks/main.yml
# Check a single certificate file using community.crypto modules

- name: Check if certificate file exists
  ansible.builtin.stat:
    path: "{{ cert_path }}"
  register: _cert_stat

- name: Initialize cert_info for missing certificate
  ansible.builtin.set_fact:
    cert_info:
      name: "{{ cert_name | default(cert_path | basename) }}"
      path: "{{ cert_path }}"
      type: "file"
      exists: false
      status: "missing"
      days_remaining: null
      expiry_date: null
      subject: null
      issuer: null
      serial: null
      key_algorithm: null
      key_size: null
      sig_algorithm: null
      san: []
      chain: null
      purpose: null
      service: "{{ cert_service | default(omit) }}"
      source: null
  when: not _cert_stat.stat.exists

- name: Extract certificate information
  when: _cert_stat.stat.exists
  block:
    - name: Get certificate info using community.crypto
      community.crypto.x509_certificate_info:
        path: "{{ cert_path }}"
      register: _cert_info
      failed_when: false

    - name: Handle certificate read error
      when: _cert_info.failed | default(false)
      ansible.builtin.set_fact:
        cert_info:
          name: "{{ cert_name | default(cert_path | basename) }}"
          path: "{{ cert_path }}"
          type: "file"
          exists: true
          status: "error"
          days_remaining: null
          expiry_date: null
          subject: null
          issuer: null
          serial: null
          key_algorithm: null
          key_size: null
          sig_algorithm: null
          san: []
          chain: null
          purpose: null
          service: "{{ cert_service | default(omit) }}"
          source: null

    - name: Process valid certificate
      when: not (_cert_info.failed | default(false))
      block:
        - name: Calculate days remaining
          ansible.builtin.set_fact:
            _days_remaining: "{{ ((_cert_info.not_after | to_datetime('%Y%m%d%H%M%SZ')) - (ansible_date_time.iso8601 | to_datetime('%Y-%m-%dT%H:%M:%SZ'))).days }}"

        - name: Determine certificate status
          ansible.builtin.set_fact:
            _cert_status: >-
              {{
                'expired' if (_days_remaining | int) < 0 else
                'critical' if (_days_remaining | int) <= (cert_critical_days | int) else
                'warning' if (_days_remaining | int) <= (cert_warning_days | int) else
                'ok'
              }}

        - name: Format subject string
          ansible.builtin.set_fact:
            _subject_str: >-
              {{ _cert_info.subject | dict2items | map(attribute='value') | map('join', '=') | join(', ') if _cert_info.subject is mapping else _cert_info.subject | default('') }}

        - name: Format issuer string
          ansible.builtin.set_fact:
            _issuer_str: >-
              {{ _cert_info.issuer | dict2items | map(attribute='value') | map('join', '=') | join(', ') if _cert_info.issuer is mapping else _cert_info.issuer | default('') }}

        - name: Check if self-signed
          ansible.builtin.set_fact:
            _is_self_signed: "{{ _cert_info.subject == _cert_info.issuer }}"

        - name: Determine certificate source
          ansible.builtin.set_fact:
            _cert_source: >-
              {{
                'Self-Signed' if _is_self_signed else
                "Let's Encrypt" if "Let's Encrypt" in (_issuer_str | string) else
                'DigiCert' if 'DigiCert' in (_issuer_str | string) else
                'Sectigo' if 'Sectigo' in (_issuer_str | string) or 'COMODO' in (_issuer_str | string) else
                'GlobalSign' if 'GlobalSign' in (_issuer_str | string) else
                'External CA'
              }}

        - name: Determine service port for verification
          ansible.builtin.set_fact:
            _service_port: >-
              {{
                443 if cert_service in ['nginx', 'httpd', 'apache'] else
                636 if cert_service == 'ldap' else
                993 if cert_service == 'dovecot' else
                5432 if cert_service == 'postgresql' else
                6379 if cert_service == 'redis' else
                9090 if cert_service == 'cockpit' else
                0
              }}
          when: cert_service is defined and cert_service != ''

        - name: Get live service certificate for comparison
          community.crypto.get_certificate:
            host: localhost
            port: "{{ _service_port | int }}"
          register: _live_cert
          failed_when: false
          when: _service_port is defined and _service_port | int > 0

        - name: Compare file and live certificates
          ansible.builtin.set_fact:
            _service_match: "{{ _cert_info.fingerprints.sha256 == _live_cert.fingerprints.sha256 }}"
            _service_verified: true
          when:
            - _live_cert is defined
            - _live_cert.fingerprints is defined

        - name: Set service not verified
          ansible.builtin.set_fact:
            _service_match: null
            _service_verified: false
          when: _service_match is not defined

        - name: Build cert_info fact
          ansible.builtin.set_fact:
            cert_info:
              name: "{{ cert_name | default(cert_path | basename) }}"
              path: "{{ cert_path }}"
              type: "file"
              exists: true
              status: "{{ _cert_status }}"
              days_remaining: "{{ _days_remaining | int }}"
              expiry_date: "{{ _cert_info.not_after }}"
              subject: "{{ _subject_str | trim }}"
              issuer: "{{ _issuer_str | trim }}"
              serial: "{{ _cert_info.serial_number }}"
              key_algorithm: "{{ _cert_info.public_key_type }}"
              key_size: "{{ _cert_info.public_key_data.size | default(_cert_info.public_key_data.curve | default('unknown')) }}"
              sig_algorithm: "{{ _cert_info.signature_algorithm }}"
              san: "{{ _cert_info.subject_alt_name | default([]) }}"
              chain:
                depth: "1"
                is_self_signed: "{{ _is_self_signed }}"
                chain_valid: true
                root_ca: "{{ _issuer_str | trim }}"
                intermediates: []
                chain_certs:
                  - depth: 0
                    subject: "{{ _subject_str | trim }}"
                    issuer: "{{ _issuer_str | trim }}"
              purpose: "{{ 'TLS Server' if 'TLS Web Server Authentication' in (_cert_info.extended_key_usage | default([])) else 'TLS Client' if 'TLS Web Client Authentication' in (_cert_info.extended_key_usage | default([])) else 'General' }}"
              service: "{{ cert_service | default(omit) }}"
              source: "{{ _cert_source }}"
              service_verified: "{{ _service_verified | default(false) }}"
              service_match: "{{ _service_match | default(None) }}"
              service_port: "{{ _service_port | default(0) | int }}"
