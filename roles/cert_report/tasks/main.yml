---
# roles/cert_report/tasks/main.yml
# Generate certificate report in multiple formats

- name: Sort report by status and days remaining
  ansible.builtin.set_fact:
    cert_report_sorted: >-
      {{
        (cert_report | selectattr('status', 'defined') | selectattr('status', 'in', ['missing', 'error', 'expired', 'critical']) | list) +
        (cert_report | selectattr('status', 'defined') | selectattr('status', 'eq', 'warning') | list) +
        (cert_report | selectattr('status', 'defined') | selectattr('status', 'eq', 'ok') | sort(attribute='days_remaining') | list) +
        (cert_report | rejectattr('status', 'defined') | list)
      }}

- name: Calculate summary statistics
  ansible.builtin.set_fact:
    cert_summary:
      host: "{{ inventory_hostname }}"
      platform: "{{ ansible_system | default('unknown') }}"
      checkDate: "{{ ansible_date_time.iso8601 }}"
      total: "{{ cert_report | length }}"
      ok: "{{ cert_report | selectattr('status', 'eq', 'ok') | list | length }}"
      warning: "{{ cert_report | selectattr('status', 'eq', 'warning') | list | length }}"
      critical: "{{ cert_report | selectattr('status', 'eq', 'critical') | list | length }}"
      expired: "{{ cert_report | selectattr('status', 'eq', 'expired') | list | length }}"
      missing: "{{ cert_report | selectattr('status', 'eq', 'missing') | list | length }}"
      error: "{{ cert_report | selectattr('status', 'eq', 'error') | list | length }}"
      thresholds:
        warningDays: "{{ warn_days }}"
        criticalDays: "{{ critical_days }}"

# Console output
- name: Display report header
  ansible.builtin.debug:
    msg: "{{ item }}"
  loop:
    - "═══════════════════════════════════════════════════════════════════════════════════════"
    - "                           CERTIFICATE EXPIRY REPORT"
    - "═══════════════════════════════════════════════════════════════════════════════════════"
    - "Host: {{ inventory_hostname }}"
    - "Platform: {{ cert_summary.platform }}"
    - "Check Date: {{ cert_summary.checkDate }}"
    - "Thresholds: Warning={{ warn_days }} days, Critical={{ critical_days }} days"
    - "───────────────────────────────────────────────────────────────────────────────────────"

- name: Display table header
  vars:
    _header: >-
      {{ '%-25s' | format('CERTIFICATE') }}
      {{ '%-8s' | format('RESULT') }}
      {{ '%-10s' | format('STATUS') }}
      {{ '%6s' | format('DAYS') }}
      {{ '%-8s' | format('SERVICE') }}
      {{ '%-25s' | format('ISSUER') }}
  ansible.builtin.debug:
    msg: "{{ _header | replace('\n', '') }}"

- name: Display each certificate
  ansible.builtin.debug:
    msg: >-
      {{ '%-25s' | format((item.name | default('Unknown'))[:25]) }}
      {{ '%-8s' | format('[FAILED]' if item.status in ['expired', 'critical', 'missing', 'error'] else '[WARN]' if item.status == 'warning' else '[OK]') }}
      {{ '%-10s' | format((item.status | default('unknown') | upper)) }}
      {{ '%6s' | format((item.days_remaining | default('N/A')) | string) }}
      {{ '%-8s' | format('[MATCH]' if item.service_match | default(false) else '[SKIP]' if not item.service_verified | default(false) else '[DIFF!]') }}
      {{ ((item.issuer | default('N/A')) | string)[:25] }}
  loop: "{{ cert_report_sorted }}"
  loop_control:
    label: "{{ item.name | default('Unknown') }}"

# Chain information (if enabled)
- name: Display chain information
  when: show_chain | bool
  block:
    - name: Display chain header
      ansible.builtin.debug:
        msg: "───────────────────────────────────────────────────────────────────────────────────────"

    - name: Display chain details for each certificate
      ansible.builtin.debug:
        msg: >-
          {{ item.name }}: Chain depth={{ item.chain.depth | default(1) }},
          Root={{ (item.chain.root_ca | default('N/A'))[:40] }},
          Self-signed={{ item.chain.is_self_signed | default(false) }}
      loop: "{{ cert_report_sorted | selectattr('chain', 'defined') | list }}"
      loop_control:
        label: "{{ item.name }}"
      when: item.chain is defined

# Summary
- name: Build summary line
  ansible.builtin.set_fact:
    _summary_line: >-
      SUMMARY: Total={{ cert_summary.total }} |
      OK={{ cert_summary.ok }} |
      Warning={{ cert_summary.warning }} |
      Critical={{ cert_summary.critical }} |
      Expired={{ cert_summary.expired }} |
      Missing={{ cert_summary.missing }}

- name: Display summary
  ansible.builtin.debug:
    msg: "{{ item }}"
  loop:
    - "─────────────────────────────────────────────────────────────────────────────────"
    - "{{ _summary_line | replace('\n', '') }}"
    - "─────────────────────────────────────────────────────────────────────────────────"

# Alerts - make issues highly visible
- name: Calculate if action is required
  ansible.builtin.set_fact:
    _action_required: "{{ (cert_summary.expired | int > 0) or (cert_summary.critical | int > 0) or (cert_summary.warning | int > 0) }}"

- name: Display action required banner
  ansible.builtin.debug:
    msg: "{{ item }}"
  loop:
    - ""
    - "!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!"
    - "                              ACTION REQUIRED"
    - "!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!"
  when: _action_required | bool

- name: Build alert messages
  ansible.builtin.set_fact:
    _alerts:
      - >-
        {{ '>>> EXPIRED: ' + (cert_summary.expired | string) +
           ' certificate(s) have EXPIRED! <<<'
           if cert_summary.expired | int > 0 else '' }}
      - >-
        {{ '>>> CRITICAL: ' + (cert_summary.critical | string) +
           ' certificate(s) expire within ' + (critical_days | string) + ' days <<<'
           if cert_summary.critical | int > 0 else '' }}
      - >-
        {{ '>>> WARNING: ' + (cert_summary.warning | string) +
           ' certificate(s) expire within ' + (warn_days | string) + ' days <<<'
           if cert_summary.warning | int > 0 else '' }}

- name: Display alerts
  ansible.builtin.debug:
    msg: "{{ item | trim }}"
  loop: "{{ _alerts | select | list }}"
  when: item | trim | length > 0

- name: Display action required footer
  ansible.builtin.debug:
    msg: "{{ item }}"
  loop:
    - "!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!"
    - ""
  when: _action_required | bool

- name: Display all OK message
  ansible.builtin.debug:
    msg: "{{ item }}"
  loop:
    - ""
    - "All certificates OK - no action required"
    - ""
  when: not _action_required | bool

# JSON output for API/portal integration
- name: Build filtered certificate lists for orchestrator
  ansible.builtin.set_fact:
    _certs_valid: >-
      {{ cert_report_sorted | selectattr('status', 'eq', 'ok') | list }}
    _certs_expiring: >-
      {{ cert_report_sorted | selectattr('status', 'in', ['warning', 'critical']) | list }}
    _certs_expired: >-
      {{ cert_report_sorted | selectattr('status', 'eq', 'expired') | list }}
    _certs_problems: >-
      {{ cert_report_sorted | selectattr('status', 'in', ['missing', 'error']) | list }}

- name: Build JSON report
  ansible.builtin.set_fact:
    _json_report:
      host: "{{ cert_summary.host }}"
      platform: "{{ cert_summary.platform }}"
      checkDate: "{{ cert_summary.checkDate }}"
      thresholds:
        warningDays: "{{ warn_days | int }}"
        criticalDays: "{{ critical_days | int }}"
      summary:
        total: "{{ cert_summary.total | int }}"
        ok: "{{ cert_summary.ok | int }}"
        warning: "{{ cert_summary.warning | int }}"
        critical: "{{ cert_summary.critical | int }}"
        expired: "{{ cert_summary.expired | int }}"
        missing: "{{ cert_summary.missing | int }}"
      flags:
        all_ok: "{{ (cert_summary.ok | int) == (cert_summary.total | int) }}"
        has_expiring: "{{ (cert_summary.warning | int + cert_summary.critical | int) > 0 }}"
        has_expired: "{{ (cert_summary.expired | int) > 0 }}"
        has_problems: "{{ (cert_summary.missing | int) > 0 or (_certs_problems | length) > 0 }}"
        needs_action: "{{ (cert_summary.warning | int + cert_summary.critical | int + cert_summary.expired | int) > 0 }}"
      lists:
        valid: "{{ _certs_valid }}"
        expiring: "{{ _certs_expiring }}"
        expired: "{{ _certs_expired }}"
        problems: "{{ _certs_problems }}"
      certificates: "{{ cert_report_sorted }}"
      # Pre-serialized JSON for orchestrator script nodes (env vars must be strings)
      certificates_json: "{{ cert_report_sorted | to_json }}"

- name: Output JSON report
  ansible.builtin.debug:
    msg: "{{ json_var_name }}={{ _json_report | to_json }}"
  when: output_json | bool

# Save JSON to file
- name: Save JSON report to file
  ansible.builtin.copy:
    content: "{{ _json_report | to_nice_json }}"
    dest: "{{ report_file | regex_replace('\\.md$', '.json') }}"
    mode: '0644'
  when: report_file | length > 0

# Markdown report
- name: Generate markdown report
  ansible.builtin.template:
    src: report.md.j2
    dest: "{{ report_file }}"
    mode: '0644'
  when: report_file | length > 0

- name: Report file locations
  ansible.builtin.debug:
    msg: "Reports saved to: {{ report_file }} and {{ report_file | regex_replace('\\.md$', '.json') }}"
  when: report_file | length > 0

# Show failed task (red) for issues but don't fail the playbook
- name: Certificate health check
  block:
    - name: Fail if certificates have issues
      ansible.builtin.fail:
        msg: |
          CERTIFICATE CHECK FAILED
          -------------------------
          Expired: {{ cert_summary.expired }}
          Critical: {{ cert_summary.critical }}
          Warning: {{ cert_summary.warning }}
          -------------------------
          Review the report above for details.
      when: _action_required | bool

  rescue:
    - name: Certificate issues detected (see report above)
      ansible.builtin.debug:
        msg: "Certificate check completed with issues - action required"

# Persist report as job artifact for orchestrator workflows
# This makes _json_report available via AAP job artifacts API
- name: Set artifacts for orchestrator workflow
  ansible.builtin.set_stats:
    data:
      cert_report: "{{ _json_report }}"
  when: cert_report | length > 0
