---
# roles/check_cert_remote/tasks/main.yml
# Check a certificate via TLS handshake using community.crypto

- name: Set SNI hostname
  ansible.builtin.set_fact:
    _sni_host: "{{ cert_servername | default(cert_host) }}"

- name: Get certificate from remote endpoint
  community.crypto.get_certificate:
    host: "{{ cert_host }}"
    port: "{{ cert_port | int }}"
    server_hostname: "{{ _sni_host }}"
    timeout: "{{ cert_timeout | default(10) }}"
  register: _remote_cert
  ignore_errors: true
  delegate_to: localhost

- name: Initialize cert_info for unreachable endpoint
  ansible.builtin.set_fact:
    cert_info:
      name: "{{ cert_name | default(cert_host + ':' + cert_port | string) }}"
      host: "{{ cert_host }}"
      port: "{{ cert_port }}"
      type: "remote"
      exists: false
      status: "error"
      error: "{{ _remote_cert.msg | default('Unable to connect or retrieve certificate') }}"
      days_remaining: null
      expiry_date: null
      subject: null
      issuer: null
      serial: null
      key_algorithm: null
      key_size: null
      sig_algorithm: null
      san: []
      chain: null
      purpose: null
      service: null
      source: null
  when: _remote_cert is failed

- name: Extract certificate information from remote endpoint
  when: _remote_cert is not failed
  block:
    - name: Calculate days remaining
      ansible.builtin.set_fact:
        _days_remaining: "{{ ((_remote_cert.not_after | to_datetime('%Y%m%d%H%M%SZ')).date() - (now(utc=true).date())).days }}"

    - name: Determine certificate status
      ansible.builtin.set_fact:
        _cert_status: >-
          {{
            'expired' if _remote_cert.expired else
            'critical' if (_days_remaining | int) <= (cert_critical_days | int) else
            'warning' if (_days_remaining | int) <= (cert_warning_days | int) else
            'ok'
          }}

    - name: Format subject string
      ansible.builtin.set_fact:
        _subject_str: "{{ _remote_cert.subject.commonName | default('') }}{% if _remote_cert.subject.organizationName is defined %}, O={{ _remote_cert.subject.organizationName }}{% endif %}{% if _remote_cert.subject.countryName is defined %}, C={{ _remote_cert.subject.countryName }}{% endif %}"

    - name: Format issuer string
      ansible.builtin.set_fact:
        _issuer_str: "{{ _remote_cert.issuer.commonName | default('') }}{% if _remote_cert.issuer.organizationName is defined %}, O={{ _remote_cert.issuer.organizationName }}{% endif %}"

    - name: Check if self-signed
      ansible.builtin.set_fact:
        _is_self_signed: "{{ _remote_cert.subject == _remote_cert.issuer }}"

    - name: Determine certificate source
      ansible.builtin.set_fact:
        _cert_source: >-
          {{
            'Self-Signed' if _is_self_signed else
            "Let's Encrypt" if "Let's Encrypt" in (_issuer_str | string) else
            'DigiCert' if 'DigiCert' in (_issuer_str | string) else
            'Sectigo' if 'Sectigo' in (_issuer_str | string) or 'COMODO' in (_issuer_str | string) else
            'GlobalSign' if 'GlobalSign' in (_issuer_str | string) else
            'Amazon' if 'Amazon' in (_issuer_str | string) else
            'Cloudflare' if 'Cloudflare' in (_issuer_str | string) else
            'External CA'
          }}

    - name: Build cert_info fact
      ansible.builtin.set_fact:
        cert_info:
          name: "{{ cert_name | default(cert_host + ':' + cert_port | string) }}"
          host: "{{ cert_host }}"
          port: "{{ cert_port }}"
          type: "remote"
          exists: true
          status: "{{ _cert_status }}"
          days_remaining: "{{ _days_remaining | int }}"
          expiry_date: "{{ _remote_cert.not_after }}"
          subject: "{{ _subject_str | trim }}"
          issuer: "{{ _issuer_str | trim }}"
          serial: "{{ _remote_cert.serial_number }}"
          key_algorithm: "{{ _remote_cert.public_key_type | default('unknown') }}"
          key_size: "{{ _remote_cert.public_key_data.size | default(_remote_cert.public_key_data.curve | default('unknown')) }}"
          sig_algorithm: "{{ _remote_cert.signature_algorithm }}"
          san: "{{ _remote_cert.subject_alt_name | default([]) }}"
          chain:
            depth: 1
            is_self_signed: "{{ _is_self_signed }}"
            chain_valid: true
            root_ca: "{{ _issuer_str | trim }}"
            intermediates: []
            chain_certs:
              - depth: 0
                subject: "{{ _subject_str | trim }}"
                issuer: "{{ _issuer_str | trim }}"
          purpose: "{{ 'TLS Server' if 'serverAuth' in (_remote_cert.extended_key_usage | default([]) | join(',')) else 'General' }}"
          service: null
          source: "{{ _cert_source }}"
