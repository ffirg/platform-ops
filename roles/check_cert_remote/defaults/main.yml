---
# roles/check_cert_remote/defaults/main.yml
# Defaults for remote TLS certificate checking

# Required input
cert_host: ""
cert_port: 443
cert_name: ""

# Connection options
cert_timeout: 10
cert_servername: ""  # SNI hostname, defaults to cert_host

# Thresholds
cert_warning_days: "{{ hostvars[inventory_hostname].cert_warning_days | default(30) }}"
cert_critical_days: "{{ hostvars[inventory_hostname].cert_critical_days | default(14) }}"
