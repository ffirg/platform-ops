---
# roles/check_server_certs/defaults/main.yml
# Defaults for generic server certificate checking

# User-provided checks (explicit mode)
# Format:
#   - name: "Display name"
#     type: file|remote
#     path: "/path/to/cert.pem"  # for file type
#     host: "hostname"           # for remote type
#     port: 443                  # for remote type
cert_checks: []

# Auto-discovery settings
cert_auto_discover: "{{ cert_checks | length == 0 }}"
cert_discover_files: true

# Thresholds
cert_warning_days: 30
cert_critical_days: 14

# Output
cert_output_json: true
cert_report_file: ""
cert_show_paths: false
cert_show_chain: true

# Fail conditions
cert_fail_on_expired: true
cert_fail_on_critical: false
cert_fail_on_warning: false
