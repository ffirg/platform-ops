---
# roles/check_aap_certs/tasks/openshift.yml
# Discover AAP certificates in OpenShift deployment

- name: Get AAP TLS secrets from OpenShift
  ansible.builtin.shell: |
    oc get secrets -n "{{ aap_namespace }}" -o json 2>/dev/null | \
      jq -r '.items[] | select(.type == "kubernetes.io/tls") | select(.metadata.name | test("automation|aap|controller|hub|eda|gateway")) | .metadata.name'
  register: _tls_secrets
  changed_when: false
  failed_when: false

- name: Display discovered secrets
  ansible.builtin.debug:
    msg: "Discovered {{ _tls_secrets.stdout_lines | length }} TLS secrets in namespace {{ aap_namespace }}"

# Extract and check each certificate
- name: Process TLS secrets
  when: _tls_secrets.stdout_lines | length > 0
  block:
    - name: Extract certificate from secret
      ansible.builtin.shell: |
        oc get secret "{{ item }}" -n "{{ aap_namespace }}" -o jsonpath='{.data.tls\.crt}' 2>/dev/null | base64 -d > "/tmp/k8s_cert_{{ item }}.pem"
        echo "/tmp/k8s_cert_{{ item }}.pem"
      loop: "{{ _tls_secrets.stdout_lines }}"
      register: _extracted_certs
      changed_when: false
      failed_when: false

    - name: Map secrets to certificate checks
      ansible.builtin.set_fact:
        cert_checks: >-
          {{
            cert_checks | default([]) + [{
              'name': (
                'Gateway' if 'gateway' in item.item else
                'Controller' if 'controller' in item.item else
                'Hub' if 'hub' in item.item else
                'EDA' if 'eda' in item.item else
                item.item | regex_replace('-tls$', '') | title
              ),
              'path': item.stdout,
              'type': 'file',
              'service': 'aap-openshift',
              'k8s_secret': item.item,
              'k8s_namespace': aap_namespace
            }]
          }}
      loop: "{{ _extracted_certs.results }}"
      when: item.rc == 0

- name: Check for cert-manager certificates
  ansible.builtin.shell: |
    oc get certificates -n "{{ aap_namespace }}" -o json 2>/dev/null | \
      jq -r '.items[] | "\(.metadata.name)|\(.status.conditions[] | select(.type=="Ready") | .status)"' || echo ""
  register: _certmanager_certs
  changed_when: false
  failed_when: false

- name: Display cert-manager certificates
  ansible.builtin.debug:
    msg: "Found {{ _certmanager_certs.stdout_lines | length }} cert-manager managed certificates"
  when: _certmanager_certs.stdout_lines | length > 0

- name: Display certificates to check
  ansible.builtin.debug:
    msg: "Will check {{ cert_checks | length }} AAP certificates from OpenShift"
