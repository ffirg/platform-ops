---
# roles/cert_common/defaults/main.yml
# Shared defaults for all certificate checking roles

# Thresholds
cert_warning_days: 30
cert_critical_days: 14

# Output options
cert_show_paths: false
cert_show_chain: true
cert_output_json: true
cert_report_file: ""

# Fail conditions
cert_fail_on_expired: true
cert_fail_on_critical: false
cert_fail_on_warning: false

# Discovery paths (for auto-discovery mode)
cert_discovery_paths:
  - /etc/ssl/certs/*.crt
  - /etc/ssl/certs/*.pem
  - /etc/pki/tls/certs/*.crt
  - /etc/pki/tls/certs/*.pem
  - /etc/nginx/ssl/*.crt
  - /etc/nginx/ssl/*.pem
  - /etc/httpd/ssl/*.crt
  - /etc/httpd/ssl/*.pem
  - /etc/letsencrypt/live/*/*.pem
  - /opt/*/ssl/*.crt
  - /opt/*/tls/*.crt

# Common TLS ports to check for remote discovery
cert_common_tls_ports:
  - 443
  - 8443
  - 636    # LDAPS
  - 993    # IMAPS
  - 995    # POP3S
  - 5432   # PostgreSQL SSL
  - 6379   # Redis TLS
